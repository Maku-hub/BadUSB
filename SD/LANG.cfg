# Character map for badusb.ino (optional).
#
# Lets you remap individual input bytes to other codes/keys before sending them
# to the host - useful when the host does not use the US keyboard layout.
#
# Format: one entry per line, three decimal numbers separated by commas:
#   in,modifier,out
#     in       - input byte code 0-255 (as read from the payload, e.g. from STRING)
#     modifier - key pressed together with "out" (0 = none)
#     out      - byte/key code actually sent to the host
#
# Modifier codes (from badusb.ino):
#   128 KEY_LEFT_CTRL   129 KEY_LEFT_SHIFT   130 KEY_LEFT_ALT    131 KEY_LEFT_GUI
#   132 KEY_RIGHT_CTRL  133 KEY_RIGHT_SHIFT  134 KEY_RIGHT_ALT (AltGr)  135 KEY_RIGHT_GUI
#
# Empty lines and lines starting with '#' are skipped.
# Up to 64 entries. No active entries => no remapping (passthrough).
#
# NOTE - limitation: convertLangChar() works on SINGLE bytes, so you can only
# map single-byte characters (0-255). Multi-byte UTF-8 characters
# (e.g. Polish 'a' with ogonek = 0xC4 0x85) will NOT work through this
# mechanism without code changes - keep payloads in ASCII.
#
# Example (uncomment to use): swap Y/Z for a host with a QWERTZ layout
# (e.g. German), where the physical Y and Z keys are swapped relative to US:
# 121,0,122    # 'y' => send 'z'
# 122,0,121    # 'z' => send 'y'
# 89,0,90      # 'Y' => send 'Z'
# 90,0,89      # 'Z' => send 'Y'
